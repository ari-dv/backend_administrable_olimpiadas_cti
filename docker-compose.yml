version: '3.8'

services:
  postgres_db:
    image: postgres:15-alpine
    container_name: cursos_db
    restart: always
    environment:
      POSTGRES_USER: ari
      POSTGRES_PASSWORD: 1234
      POSTGRES_DB: cursos_backend
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: