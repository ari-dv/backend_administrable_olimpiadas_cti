spring.application.name=demo-backend-olimpiadas

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/tu_bd_local}
spring.datasource.username=${DB_USER:tu_usuario_local}
spring.datasource.password=${DB_PASSWORD:tu_password_local}

spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true